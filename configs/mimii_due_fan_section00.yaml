seed: 42

data:
  raw_records_csv: data/raw/mimii_due/fan_section_00/records.csv
  processed_dir: data/processed/mimii_due/fan_section_00
  manifest_path: data/processed/mimii_due/fan_section_00/manifest.csv
  
  window_size: 2048
  stride: 512
  drop_last: true

  # For Paderborn we will not use anomaly intervals in the first pass.
  # Window labels will inherit record_label automatically.
  anomaly_intervals_column: anomaly_intervals
  window_label_mode: any_overlap
  min_anomaly_fraction: 0.05

representation:
  normalize_raw: true
  use_tfr: true
  tfr_type: stft
  n_fft: 256
  hop_length: 64
  win_length: 256
  log_amplitude: true
  normalize_tfr: false

training:
  batch_size: 16
  num_workers: 0
  pin_memory: false
  epochs: 3
  lr: 0.001
  weight_decay: 0.0001
  threshold: 0.5
  device: auto

model:
  use_raw: true
  use_tfr: true
  raw_embedding_dim: 64
  tfr_embedding_dim: 64
  fused_dim: 64
  dropout: 0.1

evaluation:
  normal_label: 0
  distance: l2

outputs:
  experiment_root: experiments/mimii_due
  experiment_name: fan_section_00
  run_name: run_001_supervised_pilot

sfda:
  variant: fused
  adapt_split: adapt
  epochs: 5
  lr: 0.0003
  weight_decay: 1.0e-05
  batch_size: 8
  selection_quantile: 0.3
  min_selected: 8
  align_weight: 1.0
  pseudo_label_weight: 0.1
  consistency_quantile: 0.4
  agreement_margin_quantile: 0.5