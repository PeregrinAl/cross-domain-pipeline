seed: 42
data:
  raw_records_csv: data/raw/records.csv
  processed_dir: data/processed
  manifest_path: data/processed/manifest.csv
  window_size: 2048
  stride: 512
  drop_last: true
  anomaly_intervals_column: anomaly_intervals
  window_label_mode: min_fraction
  min_anomaly_fraction: 0.05
representation:
  normalize_raw: true
  raw_normalization: zscore
  cwt_num_scales: 64
  cwt_min_scale: 1.0
  cwt_max_scale: 64.0
  cwt_hop_length: 64
  cwt_w0: 6.0
  cwt_log_amplitude: true
  cwt_normalization: none
  use_tfr: true
  tfr_type: stft
  n_fft: 256
  hop_length: 64
  win_length: 256
  log_amplitude: true

  normalize_tfr: false
  tfr_normalization: none
training:
  batch_size: 16
  num_workers: 0
  pin_memory: false
  epochs: 20
  lr: 0.001
  weight_decay: 0.0001
  threshold: 0.5
  device: auto
model:
  use_raw: true
  use_tfr: true
  raw_embedding_dim: 64
  tfr_embedding_dim: 64
  fused_dim: 64
  dropout: 0.1
evaluation:
  normal_label: 0
  distance: l2
outputs:
  source_only_dir: experiments/source_only_training
  sfda_dir: experiments/source_free_adaptation
  experiment_root: experiments
  experiment_name: baseline
sfda:
  variant: fused
  adapt_split: adapt
  epochs: 10
  lr: 0.0003
  weight_decay: 1.0e-05
  batch_size: 8
  selection_quantile: 0.3
  min_selected: 8
  align_weight: 1.0
  pseudo_label_weight: 0.1
  consistency_quantile: 0.4
  agreement_margin_quantile: 0.5
target_shift:
  amplitude_scale_min: 1.3
  amplitude_scale_max: 1.8
  extra_noise_std: 0.35
  extra_trend_strength: 0.2
  freq_multiplier_min: 1.15
  freq_multiplier_max: 1.35
  temporal_warp_sigma: 0.06
